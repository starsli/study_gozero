Name: demo1.rpc
ListenOn: 0.0.0.0:8080
Etcd:
  Hosts:
  - 127.0.0.1:2379
  Key: demo1.rpc
Log:
  ServiceName: demo1.rpc
  Mode: console    # console控制台 / file文件 / volume(k8s)
  Encoding: plain  # plain开发看日志，json生产
  Level: debug     # debug/info/error/severe，debug打印最详细
  Path: ./logs     # 文件日志存放目录
  MaxSize: 100     # 单文件最大MB
  MaxBackups: 10   # 保留备份文件数
  MaxAge: 7        # 日志保留天数
  Compress: true   # 过期日志gzip压缩
# RPC专属日志开关（rpc服务才有）
RpcLog:
  Stat: true       # 打印rpc调用统计日志
  Slow: true       # 打印慢rpc请求