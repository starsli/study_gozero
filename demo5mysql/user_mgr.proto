# 进入logic目录
cd internal/logic
# 为所有logic生成测试文件，覆盖写入
Linux： gotests -all -w *.go
windows： gotests -all -w (Get-ChildItem *.go).Name

执行单元测试，这样写自动加载所有依赖
go test -v .
*/