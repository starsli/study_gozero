syntax = "proto3";

package user_mgr;
// 相对路径;包名
option go_package = "./user_mgr_pb";

// 创建用户Req
message CreateUserReq {
    string user_id = 1;
    string name = 2;
    int32 age = 3;
}

// 创建用户Req
message CreateUserRsp {
    string user_id = 1;
    int32 is_repeat = 2;
}

message GetUserInfoReq {
    string user_id = 1;
}

message GetUserInfoRsp {
    string user_id = 1;
    string name = 2;
    int32 age = 3;
}

message GetUserBalanceReq {
    string user_id = 1;
}

message GetUserBalanceRsp {
    string user_id = 1;
    int64 balance = 2;
}

// 更新用户信息
message UpdateUserInfoReq {
    string user_id = 1;
    string name = 2;
    int32 age = 3;
}

message UpdateUserInfoRsp {
    string user_id = 1;
}

// 充值
message DepositReq {
    string user_id = 1;
    int64 amount = 2;
}

message DepositRsp {
    string user_id = 1;
    int64 balance = 2;
}

// 提现
message WithdrawReq {
    string user_id = 1;
    int64 amount = 2;
}

message WithdrawRsp {
    string user_id = 1;
    int64 balance = 2;
}

// 获取用户流水
message GetUserFlowReq {
    string user_id = 1;
    int32 offset = 2;  // 分页偏移量
    int32 limit = 3;  // 分页大小
}

message GetUserFlowRsp {
    string user_id = 1;
    repeated GetUserFlowItemRsp flow = 2;
    int32 flag = 3;  // 查询结束标记
    int32 offset = 4;  // 分页偏移量
}

message GetUserFlowItemRsp {
    string flow_id = 1;
    string user_id = 2;
    int64 amount = 3;
    int32 biz_type = 4;
    int32 flow_type = 5;
    string create_time = 6;
}

service UserMgr {
    rpc CreateUser(CreateUserReq) returns (CreateUserRsp);
    rpc GetUserInfo(GetUserInfoReq) returns (GetUserInfoRsp);
    rpc UpdateUserInfo(UpdateUserInfoReq) returns (UpdateUserInfoRsp);
    rpc GetUserBalance(GetUserBalanceReq) returns (GetUserBalanceRsp);
    rpc Deposit(DepositReq) returns (DepositRsp);
    rpc Withdraw(WithdrawReq) returns (WithdrawRsp);
    rpc GetUserFlow(GetUserFlowReq) returns (GetUserFlowRsp);
}

/*
生成项目框架
goctl rpc protoc user_mgr.proto --go_out=. --go-grpc_out=. --zrpc_out=.

生成logic单元测试代码
