syntax = "proto3";

package demo3;
// 相对路径;包名
option go_package = "./types";

message GetReq {
  string key = 1;
}

message GetRsp {
  string value = 2;
}

message SetReq {
  string key = 1;
  string value = 2;
}

message SetRsp {
}

service demo3 {
    rpc Get(GetReq) returns (GetRsp);
    rpc Set(SetReq) returns (SetRsp);
}

/*
生成项目框架
goctl rpc protoc demo3.proto --go_out=. --go-grpc_out=. --zrpc_out=.

生成logic单元测试代码
go install github.com/cweill/gotests/gotests@latest
# 进入logic目录
cd internal/logic
# 为所有logic生成测试文件，覆盖写入
Linux： gotests -all -w *.go
windows： gotests -all -w (Get-ChildItem *.go).Name

执行单元测试，这样写自动加载所有依赖
go test -v .
*/