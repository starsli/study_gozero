syntax = "proto3";
// goctl rpc protoc chatroom.proto --go_out=. --go-grpc_out=. --zrpc_out=.
package chatroom_pb;
// 相对路径;包名
option go_package = "./chatroom_pb";

message CreateChatRoomReq {
    string room_name = 1;
}

message CreateChatRoomRsp {
}

message GetRoomListReq {
}

message GetRoomListRsp {
    repeated GetRoomItemRsp room = 1;
}

message GetRoomItemRsp {
    string room_id = 1;
    string room_name = 2;
}

message SendChatMsgReq {
    string msg = 1;
}

message SendChatMsgRsp {
}

message GetRootMsgReq {
    string room_id = 1;
}

message GetRootMsgRsp {
    repeated GetChatMsgItemRsp msg = 1;
}

message GetChatMsgItemRsp {
    string user_name = 1;
    string msg = 2;
    string create_time = 3;
}

service ChatRoom {
    rpc CreateChatRoom(CreateChatRoomReq) returns (CreateChatRoomRsp);
    rpc GetRoomList(GetRoomListReq) returns (GetRoomListRsp);
    rpc SendChatMsg(SendChatMsgReq) returns (SendChatMsgRsp);
    rpc GetRootMsg(GetRootMsgReq) returns (GetRootMsgRsp);
}

