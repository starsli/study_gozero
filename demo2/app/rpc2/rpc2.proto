syntax = "proto3";

package rpc2;
// 相对路径;包名
option go_package = "./rpc2_pb";

message TestCReq {
  string input_params = 1;
}

message TestCRsp {
  string output_params = 1;
}

service Rpc2 {
  rpc TestC(TestCReq) returns (TestCRsp);
}

// 生成项目框架
// goctl rpc protoc rpc2.proto --go_out=. --go-grpc_out=. --zrpc_out=.
