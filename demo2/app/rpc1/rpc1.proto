syntax = "proto3";

package rpc1;
// 相对路径;包名
option go_package = "./rpc1_pb";

message TestCReq {
  string input_params = 1;
}

message TestCRsp {
  string output_params = 2;
}

service Rpc1 {
  rpc TestC(TestCReq) returns (TestCRsp);
}

/*
